name = "plot-money-api"
main = "src/index.ts"
compatibility_date = "2026-04-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Local-dev server port. Matches the Google OAuth redirect that's already
# registered in the Cloud Console (http://localhost:3000/...).
[dev]
port = 3000

# ---------------------------------------------------------------------------
# D1 — SQLite at the edge. Tenant data + Better Auth session/user tables.
# ---------------------------------------------------------------------------
# `database_id` gets filled in after `wrangler d1 create plot-money` (one-time
# setup, see CONTRIBUTING). For local dev `wrangler dev --local` uses a
# miniflare-backed SQLite file under .wrangler/ and ignores the id.
[[d1_databases]]
binding = "DB"
database_name = "plot-money"
database_id = "1cfdf75e-991d-42e5-8b3c-61892915c2a2"
migrations_dir = "../../packages/shared/migrations"

# ---------------------------------------------------------------------------
# R2 — object storage. Reserved for v0.2 features (CSV exports, receipt
# attachments). Empty binding now so the slot exists in production.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "FILES"
bucket_name = "plot-money-files"
preview_bucket_name = "plot-money-files-preview"

# ---------------------------------------------------------------------------
# Public env. Secrets (APP_SECRET, BETTER_AUTH_SECRET, GOOGLE_*) are set via
# `wrangler secret put <NAME>` and live encrypted in CF — never committed.
# ---------------------------------------------------------------------------
[vars]
NODE_ENV = "development"
APP_URL = "http://localhost:3000"
WEB_URL = "http://localhost:5173"
ALLOWED_ORIGINS = "http://localhost:5173"

# ---------------------------------------------------------------------------
# Production: served from path prefixes on the apex `plot.money` zone. The
# web Worker (apps/web) owns the catch-all `/*` route on the same zone, so
# Cloudflare's most-specific-match rule sends /api/*, /mcp, /health here
# and everything else to web. Single origin → no CORS / cookie-domain dance.
# ---------------------------------------------------------------------------
[env.production]
name = "plot-money-api"
routes = [
  { pattern = "plot.money/api/*", zone_name = "plot.money" },
  { pattern = "plot.money/mcp", zone_name = "plot.money" },
  { pattern = "plot.money/health", zone_name = "plot.money" },
]

[env.production.vars]
NODE_ENV = "production"
APP_URL = "https://plot.money"
WEB_URL = "https://plot.money"
ALLOWED_ORIGINS = "https://plot.money"

# wrangler's `[env.X]` sections REPLACE top-level bindings rather than
# extending them, so D1 + R2 have to be repeated.
[[env.production.d1_databases]]
binding = "DB"
database_name = "plot-money"
database_id = "1cfdf75e-991d-42e5-8b3c-61892915c2a2"
migrations_dir = "../../packages/shared/migrations"

[[env.production.r2_buckets]]
binding = "FILES"
bucket_name = "plot-money-files"

[env.production.observability]
enabled = true

# ---------------------------------------------------------------------------
# Preview: same code, attached to p.plot.money. Shares prod D1/R2 — preview
# is for landing-page review, not a separate dataset.
# ---------------------------------------------------------------------------
[env.preview]
name = "plot-money-api-preview"
routes = [
  { pattern = "p.plot.money/api/*", zone_name = "plot.money" },
  { pattern = "p.plot.money/mcp", zone_name = "plot.money" },
  { pattern = "p.plot.money/health", zone_name = "plot.money" },
]

[env.preview.vars]
NODE_ENV = "production"
APP_URL = "https://p.plot.money"
WEB_URL = "https://p.plot.money"
ALLOWED_ORIGINS = "https://p.plot.money"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "plot-money"
database_id = "1cfdf75e-991d-42e5-8b3c-61892915c2a2"
migrations_dir = "../../packages/shared/migrations"

[[env.preview.r2_buckets]]
binding = "FILES"
bucket_name = "plot-money-files"

[env.preview.observability]
enabled = true
